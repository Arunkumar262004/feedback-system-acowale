version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: acowale
      POSTGRES_PASSWORD: acowale
      POSTGRES_DB: acowale_crm
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U acowale']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://acowale:acowale@db:5432/acowale_crm
      DATABASE_SSL: 'false'
      JWT_SECRET: local-dev-secret
      JWT_EXPIRES_IN: 8h
      ADMIN_EMAIL: admin@acowale.com
      ADMIN_PASSWORD: ChangeMe123!
      CORS_ORIGINS: http://localhost:5173
    ports:
      - '5000:5000'

volumes:
  pgdata:
